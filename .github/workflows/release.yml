name: release

# Build and publish a GitHub Release whenever a version tag (v*) is pushed.
# Uses the Actions-provided GITHUB_TOKEN — no local gh/token needed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set these repo secrets so release builds ship with a working
          # Google Drive client. If unset, Google Drive is simply disabled in the
          # built binary (Amazon S3 still works). See README "Building Google Drive
          # support from source".
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClipToAll ${{ github.ref_name }}'
          releaseBody: |
            ## Install
            Download the `.exe` installer below and run it (Windows 10/11).

            > The installer is not code-signed yet, so Windows SmartScreen may warn
            > you — click **More info -> Run anyway**.

            ## Highlights
            - Global-hotkey region capture (Alt+X), copy-image or copy-link mode
            - Built-in annotation editor (pencil, rectangles, arrows, text)
            - Upload to your own Amazon S3 or Google Drive, link on the clipboard
            - Plugin system (native exe / Python / C# / PowerShell), incl. optional AES-256 clipboard encryption
            - 5 themes, HiDPI-correct output

            See the [README](https://github.com/ultrathinker/cliptoall) for details.
          # Draft = the release is built and assets attached automatically, but stays
          # unpublished until you click "Publish" in the GitHub UI. Flip to false for
          # fully-automatic publishing.
          releaseDraft: true
          prerelease: false
