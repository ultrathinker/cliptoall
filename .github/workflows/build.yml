name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Windows is the currently supported platform. macOS/Linux are on the
        # roadmap — add them here once the platform backends exist:
        #   - { os: macos-latest,  target: universal-apple-darwin }
        #   - { os: ubuntu-22.04,  target: x86_64-unknown-linux-gnu }
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux runners would need webkit2gtk + appindicator here; see the Tauri
      # v2 Linux prerequisites when the ubuntu matrix entry is enabled.

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test (Rust)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Build the standalone plugin crates (separate Cargo workspaces, each with
      # its own Cargo.toml under plugins/<crate>/). `aumid-plugin` uses windows-rs
      # and only compiles on Windows, which matches the matrix above.
      - name: Build plugin crates
        run: |
          cargo build --manifest-path plugins/plugin-template/Cargo.toml
          cargo build --manifest-path plugins/encryption-plugin/Cargo.toml
          cargo build --manifest-path plugins/aumid-plugin/Cargo.toml

      # Install a prebuilt cargo-audit binary (no compile) — lighter than
      # `cargo install cargo-audit`, and avoids rustsec/audit-check's assumption
      # of a repo-root Cargo.lock (ours lives in src-tauri).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Advisory audit is informational — a new RUSTSEC advisory shouldn't block
      # an unrelated PR, so let it report without failing the build.
      - name: Rust dependency audit
        continue-on-error: true
        run: cargo audit --file src-tauri/Cargo.lock

      - name: npm dependency audit
        continue-on-error: true
        run: npm audit --audit-level=high

      # Frontend bundle only (fast). Clippy + tests above already compile all
      # Rust code, so CI verifies everything compiles without the expensive full
      # `tauri build` — the release workflow (release.yml, on version tags) does
      # the full bundle.
      - name: Build frontend
        run: npm run build
