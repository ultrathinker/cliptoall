name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Windows is the currently supported platform. macOS/Linux are on the
        # roadmap — add them here once the platform backends exist:
        #   - { os: macos-latest,  target: universal-apple-darwin }
        #   - { os: ubuntu-22.04,  target: x86_64-unknown-linux-gnu }
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux runners would need webkit2gtk + appindicator here; see the Tauri
      # v2 Linux prerequisites when the ubuntu matrix entry is enabled.

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build (Tauri)
        run: npm run tauri build
